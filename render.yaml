services:
  - type: web
    name: yuanhai-api
    runtime: node
    plan: starter
    buildCommand: cd server && npm install
    startCommand: cd server && npm run migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: yuanhai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: LS_API_KEY
        sync: false
      - key: LS_STORE_ID
        sync: false
      - key: LS_WEBHOOK_SECRET
        sync: false
      - key: LS_PRODUCT_PRO_MONTHLY_VARIANT_ID
        sync: false
      - key: LS_PRODUCT_PRO_YEARLY_VARIANT_ID
        sync: false
      - key: LS_PRODUCT_ENT_MONTHLY_VARIANT_ID
        sync: false
      - key: LS_PRODUCT_ENT_YEARLY_VARIANT_ID
        sync: false
      - key: YSM_PID
        sync: false
      - key: YSM_MERCHANT_KEY
        sync: false
      - key: YSM_NOTIFY_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: WEB_ORIGIN
        value: https://app.yourdomain.com
      - key: EXTENSION_ID
        sync: false
      - key: PORT
        value: 3000

  - type: cron
    name: yuanhai-cron-expired
    runtime: node
    plan: starter
    schedule: "0 * * * *"
    buildCommand: cd server && npm install
    startCommand: cd server && node src/cron/run-expired.js

  - type: cron
    name: yuanhai-cron-quota-reset
    runtime: node
    plan: starter
    schedule: "0 0 1 * *"
    buildCommand: cd server && npm install
    startCommand: cd server && node src/cron/run-quota-reset.js

databases:
  - name: yuanhai-db
    databaseName: yuanhai
    plan: starter-0
    postgresMajorVersion: "16"
